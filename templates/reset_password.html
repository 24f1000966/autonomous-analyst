{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto;">
    <h2 style="margin-bottom: 0.5rem; text-align: center;">Reset Password</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">Enter your email and we'll send you instructions to reset your password.</p>
    
    <form method="POST" action="">
        <div class="form-group">
            <label for="email" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Send Reset Link</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Remembered your password? <a href="{{ url_for('login') }}">Back to Login</a>
    </p>
</div>
{% endblock %}
