{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto;">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
    <form method="POST" action="">
        <div class="form-group">
            <label for="email" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
    </p>
</div>
{% endblock %}
