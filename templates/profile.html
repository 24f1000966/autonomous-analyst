{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fa-solid fa-user-circle" style="font-size: 4rem; color: var(--primary);"></i>
        <h2 style="margin-top: 1rem;">{{ current_user.username }}</h2>
        <p style="color: var(--text-muted);">{{ current_user.email }}</p>
        <div style="margin-top: 0.5rem;">
            <span style="background: var(--warning); color: #000; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold;">{{ current_user.tier }} TIER</span>
        </div>
    </div>
    
    <form method="POST" action="{{ url_for('profile') }}">
        <h4 style="margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Agency Customizations</h4>
        <div class="form-group">
            <label for="company_name" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Company / Agency Name</label>
            <input type="text" id="company_name" name="company_name" class="form-control" value="{{ current_user.company_name }}" required>
        </div>
        
        <div class="form-group">
            <label for="theme_color" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Brand Primary Color</label>
            <input type="color" id="theme_color" name="theme_color" value="{{ current_user.theme_color }}" style="width: 100%; height: 50px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer;">
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Save Profile Settings</button>
            <a href="{{ url_for('logout') }}" class="btn btn-outline" style="color: var(--danger); border-color: var(--danger);"><i class="fa-solid fa-sign-out-alt"></i> Secure Logout</a>
        </div>
    </form>
</div>
{% endblock %}
